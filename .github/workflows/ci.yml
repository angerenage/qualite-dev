name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["17", "21"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Build and tests
        run: mvn -B clean verify

      - name: Upload jar artifact
        if: matrix.java == '17'
        uses: actions/upload-artifact@v4
        with:
          name: master-annonce-jar
          path: target/qualite-dev-1.0.0.jar

  coverage:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build tests with JaCoCo
        run: mvn -B clean verify -Pcoverage

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

  docker:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build docker image
        run: docker build -t masterannonce:ci .

      - name: Export docker image as artifact
        run: docker save masterannonce:ci -o masterannonce-image.tar

      - name: Upload docker artifact
        uses: actions/upload-artifact@v4
        with:
          name: master-annonce-docker-image
          path: masterannonce-image.tar
