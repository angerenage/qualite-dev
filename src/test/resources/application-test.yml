spring:
  datasource:
    url: jdbc:h2:mem:masterannonce;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema-h2.sql
      data-locations: classpath:sql/dataset.sql

app:
  jwt:
    secret: test-secret-key-test-secret-key-1234
    expiration-seconds: 3600
